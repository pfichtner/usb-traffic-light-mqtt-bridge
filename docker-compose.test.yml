services:
  mqtt:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "11883:1883"

  bridge:
    build: .
    restart: unless-stopped
    depends_on:
      - mqtt
    environment:
      MQTT_HOST: mqtt
      MQTT_PORT: "1883"
      MQTT_TOPIC_PREFIX: test/ampel/
      LIGHT_BACKEND: mock
      LOG_LEVEL: DEBUG
      DEVICE_ID: test
